<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defective PSNs Map</title>

    <style>
        :root {
            --accent: #0f766e;
            --accent-dark: #134e4a;
            --ink: #172033;
            --muted: #64748b;
            --line: #d7dee8;
            --panel: #ffffff;
            --page: #eef4f7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            background:
                linear-gradient(180deg, #dff7f2 0, var(--page) 260px),
                var(--page);
            color: var(--ink);
        }

        h2 {
            margin-bottom: 15px;
            color: var(--accent);
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        #map-container svg {
            width: 100%;
            height: 500px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
        }

        path {
            fill: #eef2f6;
            stroke: #94a3b8;
            stroke-width: 1;
        }

        .side-panel {
            width: 300px;
            background: var(--panel);
            padding: 15px;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
        }

        .company-item {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
        }

        .rank {
            font-weight: bold;
            color: var(--accent);
        }

        .count {
            color: var(--muted);
            font-size: 12px;
        }

        .table-panel {
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
        }

        .table-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .table-header span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .table-scroll {
            max-height: 440px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel);
            table-layout: fixed;
        }

        th, td {
            border-bottom: 1px solid var(--line);
            padding: 12px;
            vertical-align: top;
        }

        th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-align: left;
            z-index: 1;
        }

        th.count-col,
        td.count-col {
            width: 90px;
            text-align: center;
        }

        th.state-col,
        td.state-col {
            width: 170px;
            font-weight: 800;
        }

        .psn-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .psn-chip {
            position: relative;
            display: inline-flex;
            align-items: center;
            max-width: 180px;
            min-height: 26px;
            padding: 4px 8px;
            border-radius: 999px;
            background: #eef8f6;
            border: 1px solid #bfebe3;
            color: var(--accent-dark);
            font-size: 12px;
            font-weight: 700;
            overflow-wrap: anywhere;
            cursor: default;
        }

        .psn-chip:hover,
        .psn-chip:focus {
            background: #d9f8f1;
            border-color: var(--accent);
            outline: none;
        }

        .map-label {
            pointer-events: none;
        }

        .floating-tooltip {
            position: fixed;
            z-index: 1000;
            display: none;
            max-width: 300px;
            padding: 11px 13px;
            border-radius: 8px;
            background: #172033;
            color: white;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.26);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.55;
            white-space: pre-line;
            overflow-wrap: anywhere;
            pointer-events: none;
        }

        .count-badge {
            display: inline-flex;
            min-width: 34px;
            justify-content: center;
            padding: 5px 8px;
            border-radius: 999px;
            background: var(--accent);
            color: white;
            font-weight: 800;
        }

        .empty {
            padding: 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        @media (max-width: 760px) {
            body { padding: 14px; }
            .container { display: block; }
            .side-panel {
                width: 100%;
                margin-top: 16px;
            }
            #map-container svg { height: auto; }
            .table-header { align-items: flex-start; }
            th.state-col,
            td.state-col {
                width: 110px;
            }
            th.count-col,
            td.count-col {
                width: 70px;
            }
        }
    </style>
</head>

<body>

<h2>Defective PSNs (US Map)</h2>
<div id="psnTooltip" class="floating-tooltip"></div>
<div id="emptyState" class="empty" style="display:none;">
    No defect data is loaded yet. Analyze an Excel file from the dashboard first, then open this map.
</div>

<div class="container">

    <!-- ✅ MAP -->
    <div style="flex:1;">
        <div id="map-container"></div>
    </div>

    <!-- ✅ TOP COMPANIES -->
    <div class="side-panel">
        <h3>Top 10 Companies</h3>
        <div id="companyList"></div>
    </div>

</div>

<div class="table-panel">
    <div class="table-header">
        <h3>Defective PSNs by State</h3>
        <span id="tableSummary"></span>
    </div>
    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th class="state-col">State</th>
                    <th class="count-col">Count</th>
                    <th>PSNs</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function() {

async function load() {

    // ✅ LOAD SVG
    const svgRes = await fetch("/static/us.svg");
    const svgText = await svgRes.text();
    document.getElementById("map-container").innerHTML = svgText;

    const svg = document.querySelector("#map-container svg");
    const table = document.getElementById("table");
    const tableSummary = document.getElementById("tableSummary");
    const tooltip = document.getElementById("psnTooltip");

    // ✅ DATA
    const res = await fetch("/defects-details");
    let data = {};

    if (res.ok) {
        data = await res.json();
    } else {
        const fallbackRes = await fetch("/defects-data");
        const fallbackData = await fallbackRes.json();

        for (const state in fallbackData) {
            data[state] = fallbackData[state].map(psn => ({
                psn: psn,
                asc_name: "Update backend to show ASC",
                city: "Update backend to show city",
                state: state
            }));
        }
    }

    const companyRes = await fetch("/top-companies");
    const companies = await companyRes.json();

    const companyList = document.getElementById("companyList");

    // ✅ RENDER TOP COMPANIES
    companyList.innerHTML = "";
    companies.forEach((item, index) => {

        const name = item[0];
        const count = item[1];

        companyList.innerHTML += `
        <div class="company-item">
            <div class="rank">${index + 1}. ${name}</div>
            <div class="count">${count} defective PSNs</div>
        </div>
        `;
    });

    // ✅ STATE MAP
    const stateToAbbrev = {
        "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR",
        "California":"CA","Colorado":"CO","Connecticut":"CT","Delaware":"DE",
        "Florida":"FL","Georgia":"GA","Hawaii":"HI","Idaho":"ID",
        "Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS",
        "Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD",
        "Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS",
        "Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV",
        "New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY",
        "North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK",
        "Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC",
        "South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT",
        "Vermont":"VT","Virginia":"VA","Washington":"WA","West Virginia":"WV",
        "Wisconsin":"WI","Wyoming":"WY"
    };

    Object.values(stateToAbbrev).forEach(abbrev => {
        stateToAbbrev[abbrev] = abbrev;
    });

    // ✅ DYNAMIC COLOR SCALE
    const counts = Object.values(data).map(v => v.length);
    const emptyState = document.getElementById("emptyState");

    if (!counts.length) {
        emptyState.style.display = "block";
        tableSummary.textContent = "0 states";
        return;
    }

    emptyState.style.display = "none";
    tableSummary.textContent = `${Object.keys(data).length} states | ${counts.reduce((sum, count) => sum + count, 0)} PSNs`;

    const min = Math.min(...counts);
    const max = Math.max(...counts);

    function getColor(count) {

        if (max === min) return "#99f6e4";

        const ratio = (count - min) / (max - min);

        const light = [204, 251, 241];
        const dark = [15, 118, 110];
        const mixed = light.map((value, index) => {
            return Math.floor(value + (dark[index] - value) * ratio);
        });

        return `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`;
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
        return escapeHtml(value).replace(/\n/g, "&#10;");
    }

    function psnChips(items) {
        return items
            .map(item => {
                const tooltip = [
                    `PSN: ${item.psn || "Unknown"}`,
                    `ASC: ${item.asc_name || "Unknown"}`,
                    `City: ${item.city || "Unknown"}`,
                    `State: ${item.state || "Unknown"}`
                ].join("\n");

                return `<span class="psn-chip" tabindex="0" data-tooltip="${escapeAttr(tooltip)}">${escapeHtml(item.psn || "Unknown")}</span>`;
            })
            .join("");
    }

    function showPsnTooltip(target) {
        const text = target.dataset.tooltip;
        if (!text) return;

        tooltip.textContent = text;
        tooltip.style.display = "block";
        positionPsnTooltip(target);
    }

    function hidePsnTooltip() {
        tooltip.style.display = "none";
    }

    function positionPsnTooltip(target) {
        if (tooltip.style.display !== "block") return;

        const rect = target.getBoundingClientRect();
        const tooltipRect = tooltip.getBoundingClientRect();
        const gap = 10;

        let left = rect.left;
        let top = rect.top - tooltipRect.height - gap;

        if (top < 8) {
            top = rect.bottom + gap;
        }

        if (left + tooltipRect.width > window.innerWidth - 8) {
            left = window.innerWidth - tooltipRect.width - 8;
        }

        if (left < 8) {
            left = 8;
        }

        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;
    }

    table.addEventListener("mouseover", event => {
        const chip = event.target.closest(".psn-chip");
        if (chip) showPsnTooltip(chip);
    });

    table.addEventListener("mouseout", event => {
        if (event.target.closest(".psn-chip")) hidePsnTooltip();
    });

    table.addEventListener("mousemove", event => {
        const chip = event.target.closest(".psn-chip");
        if (chip) positionPsnTooltip(chip);
    });

    table.addEventListener("focusin", event => {
        const chip = event.target.closest(".psn-chip");
        if (chip) showPsnTooltip(chip);
    });

    table.addEventListener("focusout", event => {
        if (event.target.closest(".psn-chip")) hidePsnTooltip();
    });

    window.addEventListener("scroll", hidePsnTooltip, true);
    window.addEventListener("resize", hidePsnTooltip);

    // ✅ LOOP STATES
    const sortedStates = Object.keys(data).sort((a, b) => {
        return data[b].length - data[a].length || a.localeCompare(b);
    });

    for (const state of sortedStates) {

        const cleanState = state.trim();
        const items = data[state];
        const count = items.length;

        table.innerHTML += `
        <tr>
            <td class="state-col">${escapeHtml(cleanState)}</td>
            <td class="count-col"><span class="count-badge">${count}</span></td>
            <td><div class="psn-list">${psnChips(items)}</div></td>
        </tr>`;

        const abbrev = stateToAbbrev[cleanState];

        if (!abbrev) continue;

        const stateElement = document.getElementById(abbrev);

        if (stateElement) {

            // ✅ COLOR
            stateElement.style.fill = getColor(count);
            stateElement.style.stroke = "#0f766e";
            stateElement.style.strokeWidth = "1.4";

            const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
            title.textContent = `${cleanState}: ${count} defective PSNs`;
            stateElement.appendChild(title);

            // ✅ LABEL
            const bbox = stateElement.getBBox();

            const x = bbox.x + bbox.width / 2;
            const y = bbox.y + bbox.height / 2;
            const canFitLabel = bbox.width >= 28 && bbox.height >= 18;

            if (!canFitLabel) continue;

            const label = document.createElementNS("http://www.w3.org/2000/svg", "text");

            label.setAttribute("x", x);
            label.setAttribute("y", y);
            label.setAttribute("class", "map-label");
            label.setAttribute("font-size", "12");
            label.setAttribute("font-weight", "900");
            label.setAttribute("text-anchor", "middle");
            label.setAttribute("dominant-baseline", "middle");

            label.setAttribute("stroke", "white");
            label.setAttribute("stroke-width", "3");
            label.setAttribute("paint-order", "stroke");

            label.setAttribute("fill", count > (min + max)/2 ? "white" : "black");

            label.textContent = abbrev;

            svg.appendChild(label);
        }
    }
}

load();

});

</script>

</body>
</html>
